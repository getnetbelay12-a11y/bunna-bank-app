<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
  </head>
  <body style="margin:0;padding:0;background:#f6f3f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#243746;">
    <div style="padding:24px 12px;">
      <div style="max-width:640px;margin:0 auto;background:#ffffff;border:1px solid #e2d8d6;border-radius:20px;overflow:hidden;box-shadow:0 14px 34px rgba(36,55,70,0.08);">
        <div style="padding:28px 28px 24px;background:linear-gradient(135deg,#7f1016,#611015);color:#ffffff;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0">
            <tr>
              <td style="vertical-align:middle;padding-right:16px;">
                <img src="{{logoUrl}}" alt="Bunna Bank" width="56" height="56" style="display:block;border:0;outline:none;text-decoration:none;width:56px;height:56px;object-fit:contain;background:#ffffff;border-radius:12px;padding:6px;" />
              </td>
              <td style="vertical-align:middle;">
                <div style="color:#f3d9c7;font-size:14px;font-weight:700;letter-spacing:1px;">BUNNA BANK</div>
                <h1 style="margin:6px 0 0;font-size:24px;line-height:1.2;color:#ffffff;">{{title}}</h1>
              </td>
            </tr>
          </table>
        </div>
        <div style="padding:28px;">
          {{englishContent}}
          <hr style="border:none;border-top:1px solid #e2d8d6;margin:28px 0;" />
          {{amharicContent}}
        </div>
      </div>
    </div>
  </body>
</html>
